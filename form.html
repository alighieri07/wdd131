<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Product Review Form</title>
  <link rel="stylesheet" href="styles/form.css">
</head>
<body>
  <header>
    <h1>Product Review</h1>
  </header>

  <main>
    <form method="get" action="review.html">
        <label for="product">Product Name:</label>
        <select id="product" name="product" required>
            <option value="" disabled selected>Select a Product ...</option>
        </select>
        <fieldset>
            <legend>Overall Rating</legend>
            <label for="rating1">1 ☆<input type="radio" id="rating1" name="rating" value="1" required></label>
            <label for="rating2">2 ☆<input type="radio" id="rating2" name="rating" value="2"></label>
            <label for="rating3">3 ☆<input type="radio" id="rating3" name="rating" value="3"></label>
            <label for="rating4">4 ☆<input type="radio" id="rating4" name="rating" value="4"></label>
            <label for="rating5">5 ☆<input type="radio" id="rating5" name="rating" value="5"></label>
        </fieldset>

        <label for="installDate">Date of Installation:</label>
        <input type="date" id="installDate" name="installDate" required>

        <fieldset>
            <legend>Useful Features</legend>
            <label for="feature1"><input type="checkbox" id="feature1" name="features" value="easySetup"> Easy Setup</label>
            <label for="feature2"><input type="checkbox" id="feature2" name="features" value="goodValue"> Good Value</label>
            <label for="feature3"><input type="checkbox" id="feature3" name="features" value="durable"> Durable</label>
            <label for="feature4"><input type="checkbox" id="feature4" name="features" value="easyToUse"> Easy to Use</label>
            <label for="feature5"><input type="checkbox" id="feature5" name="features" value="goodDesign"> Good Design</label>
        </fieldset>

        <label for="review">Written Review:</label>
        <textarea id="review" name="review"></textarea>

        <label for="username">User Name:</label>
        <input type="text" id="username" name="username">
        
        <input type="submit" value="Submit Review">
    </form>
  </main>

  <footer>
    <p>© <span id="year"></span> Product Review</p>
    <p>Last modified: <span id="lastModified"></span></p>
  </footer>

  <script src="scripts/form.js"></script>
</body>
</html>
