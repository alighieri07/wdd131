<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Lazy Loading Images</title>
  <link rel="stylesheet" href="styles/lazyload.css">
</head>
<body>

  <main>
    <h1>Lazy Loading Images</h1>
    <img src="https://picsum.photos/seed/forest/400/600" alt="A forest landscape" width="400" height="600" loading="lazy">
    <img src="https://picsum.photos/seed/mountain/400/600" alt="A mountain view" width="400" height="600" loading="lazy">
    <img src="https://picsum.photos/seed/ocean/400/600" alt="An ocean scene" width="400" height="600" loading="lazy">
    <img src="https://picsum.photos/seed/city/400/600" alt="A city skyline" width="400" height="600" loading="lazy">
    <img src="https://picsum.photos/seed/desert/400/600" alt="A desert landscape" width="400" height="600" loading="lazy">
    <img src="https://picsum.photos/seed/river/400/600" alt="A river scene" width="400" height="600" loading="lazy">
  </main>

  <footer>
    <p>Nature Photography Gallery</p>
    <p>Last modified: <span id="lastModified"></span></p>
  </footer>

  <script src="scripts/lazyload.js"></script>
 

</body>
</html>
