<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Temple Album</title>
     <meta name="description" content="A collection of images from various LDS temples around the world">
     <meta name="author" content="Alighieri Vergara">
    <link rel="stylesheet" href="styles/temples.css">
    <link rel="stylesheet" href="styles/temples-large.css">
    

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

    <link href="https://fonts.googleapis.com/css2?family=Roboto&display=swap" rel="stylesheet">

    <script defer src="scripts/temples.js"></script>

</head>
<body>
    <header>
        <h1>Temple Album</h1>
        <button id="menu-button" type="button">☰</button>
        <nav id="navbar">
            <ul>
                <li><a href="#">Home</a></li>
                <li><a href="#">Old</a></li>
                <li><a href="#">New</a></li>
                <li><a href="#">Large</a></li>
                <li><a href="#">Small</a></li>
            </ul>
        </nav>
    </header>

    <main>
        <h2>Our Temples</h2>
        
        <div class="container">
            <figure>
                <img src="images/accra-ghana-temple.jpeg" alt="Accra Ghana Temple">
                <figcaption>Accra Ghana Temple</figcaption>
            </figure>
            <figure>
                <img src="images/bahia-blanca-temple.jpeg" alt="Bahía Blanca Temple">
                <figcaption>Bahía Blanca Temple</figcaption>
            </figure>
            <figure>
                <img src="images/brisbane-temple.jpeg" alt="Brisbane Temple">
                <figcaption>Brisbane Temple</figcaption>
            </figure>
            <figure>
                <img src="images/campinas-temple.jpeg" alt="Campinas Temple">
                <figcaption>Campinas Temple</figcaption>
            </figure>
            <figure>
                <img src="images/san-pedro-sula-temple.jpeg" alt="San Pedro Sula Temple">
                <figcaption>San Pedro Sula</figcaption>
            </figure>
            <figure>
                <img src="images/draper-temple.jpeg" alt="Draper Temple">
                <figcaption>Draper Temple</figcaption>
            </figure>
            <figure>
                <img src="images/elko-temple.jpeg" alt="Elko Temple">
                <figcaption>Elko Temple</figcaption>
            </figure>
            <figure>
                <img src="images/concepcion-temple.jpeg" alt="Concepción Temple">
                <figcaption>Concepción Temple</figcaption>
            </figure>
            <figure>
                <img src="images/yigo-guam-temple.jpeg" alt="Yigo Guam Temple">
                <figcaption>Yigo Guam Temple</figcaption>
            </figure>
        </div>
    </main>

    <footer>
        <p>© <span id="year"></span> Temple Album All rights reserved</p>
        <p>Last modified: <span id="lastModified"></span></p>
    </footer>
</body>
</html>
